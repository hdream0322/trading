services:
  trading-bot:
    # GitHub Actions가 main 브랜치로 푸시될 때마다 빌드해 GHCR에 올리는 이미지.
    # NAS(Container Manager)는 이 이미지를 pull 받아 실행.
    # 로컬 개발에서 소스 기반으로 바로 빌드하려면 `docker compose build` 또는
    # `docker compose up --build` 사용 (아래 build: 섹션 덕에 동작).
    image: ghcr.io/hdream0322/trading:latest
    build: .
    container_name: trading-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./tokens:/app/tokens
      - ./config:/app/config:ro
    command: ["python", "-m", "trading_bot.main"]
    labels:
      # Watchtower 가 이 label=true 컨테이너만 감시/업데이트 대상으로 삼는다.
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────
  # 자동 업데이트 에이전트 (HTTP API 모드)
  # Watchtower 는 이미지 pull + 컨테이너 교체 실행만 담당한다. 스케줄링과
  # enable/disable 토글은 trading-bot 내부에서 관리.
  #
  #   - 매일 02:00 KST 에 trading-bot 의 APScheduler 가 HTTP API 호출
  #   - 사용자가 /update 명령으로 언제든 수동 호출 가능
  #   - /update disable 로 자동 업데이트 끄면 02:00 스케줄 스킵 (수동은 여전히 가능)
  #
  # 네트워크: compose 기본 네트워크에서 trading-bot 이 `http://watchtower:8080`
  # 으로 접근. 포트는 외부에 공개되지 않음 (expose 는 compose 내부망 전용).
  # ─────────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: trading-bot-watchtower
    restart: unless-stopped
    environment:
      - TZ=Asia/Seoul
      # label 이 붙은 컨테이너만 감시 — trading-bot 하나만 대상
      - WATCHTOWER_LABEL_ENABLE=true
      # 업데이트 후 오래된 이미지는 삭제 (디스크 절약)
      - WATCHTOWER_CLEANUP=true
      # 기동 시 배너 알림 생략
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
      # 결과는 리포트 형태로 배치 전송 (하나의 알림에 요약)
      - WATCHTOWER_NOTIFICATION_REPORT=true
      # HTTP API 만 활성화, 주기 폴링은 꺼둠 (봇이 스케줄 관리)
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=false
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_TOKEN}
      # 알림 채널: shoutrrr 기반 Telegram
      # ${} 값들은 프로젝트 루트 .env 에서 자동 치환됨 (compose interpolation).
      # env_file 로 전체 .env 를 로드하지 않아서 KIS/Anthropic 키는 이 컨테이너에
      # 절대 들어가지 않는다 — 보안 분리 목적.
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=telegram://${TELEGRAM_BOT_TOKEN}@telegram?chats=${TELEGRAM_CHAT_ID}
      - WATCHTOWER_NOTIFICATION_TITLE_TAG=봇 자동 업데이트
    expose:
      - "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
