services:
  trading-bot:
    # GitHub Actions가 main 브랜치로 푸시될 때마다 빌드해 GHCR에 올리는 이미지.
    # NAS(Container Manager)는 이 이미지를 pull 받아 실행.
    # 로컬 개발에서 소스 기반으로 바로 빌드하려면 `docker compose build` 또는
    # `docker compose up --build` 사용 (아래 build: 섹션 덕에 동작).
    image: ghcr.io/hdream0322/trading:latest
    build: .
    container_name: trading-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./tokens:/app/tokens
      - ./config:/app/config:ro
    command: ["python", "-m", "trading_bot.main"]
