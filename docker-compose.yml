services:
  trading-bot:
    # GitHub Actions가 main 브랜치로 푸시될 때마다 빌드해 GHCR에 올리는 이미지.
    # NAS(Container Manager)는 이 이미지를 pull 받아 실행.
    # 로컬 개발에서 소스 기반으로 바로 빌드하려면 `docker compose build` 또는
    # `docker compose up --build` 사용 (아래 build: 섹션 덕에 동작).
    image: ghcr.io/hdream0322/trading:latest
    build: .
    container_name: trading-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul
      # glibc resolver 가 AAAA 질의 자체를 건너뛰게 해서 컨테이너에 IPv6 주소가
      # 반환되지 않도록 강제. 아래 sysctls / gai.conf 와 삼중 방어 — 어느 한 단계가
      # 무력화돼도 IPv4 경로로 안전하게 떨어지게 함.
      - RES_OPTIONS=no-aaaa
    # Docker 기본 bridge 네트워크는 IPv6 미구성 상태인데, glibc/getaddrinfo 는
    # api.telegram.org 같은 도메인을 IPv6(AAAA)으로 해석해 버린다. 그러면 connect()
    # 시 로컬 IPv6 주소 바인드 실패 → `[Errno 99] Cannot assign requested address`
    # 로 요청이 주기적으로 지연/실패함 (Telegram 응답 지연의 실제 원인).
    # 컨테이너 내부에서만 IPv6 스택을 꺼 IPv4 경로만 사용하도록 강제한다.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./tokens:/app/tokens
      - ./config:/app/config  # 텔레그램 /set, /config reset 가 settings.yaml 을 쓰므로 ro 제거
      # gai.conf — getaddrinfo 에서 IPv4 를 IPv6 보다 우선시. 혹시 glibc 가 AAAA 를
      # 반환하더라도 httpx 가 IPv4 를 먼저 잡도록 보장.
      - ./config/gai.conf:/etc/gai.conf:ro
    command: ["python", "-m", "trading_bot.main"]
    labels:
      # Watchtower 가 이 label=true 컨테이너만 감시/업데이트 대상으로 삼는다.
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────
  # 자동 업데이트 에이전트 (HTTP API 모드)
  # Watchtower 는 이미지 pull + 컨테이너 교체 실행만 담당한다. 스케줄링과
  # enable/disable 토글은 trading-bot 내부에서 관리.
  #
  #   - 매일 08:30 KST 에 trading-bot 의 APScheduler 가 HTTP API 호출
  #   - 사용자가 /update 명령으로 언제든 수동 호출 가능
  #   - /update disable 로 자동 업데이트 끄면 08:30 스케줄 스킵 (수동은 여전히 가능)
  #
  # 네트워크: compose 기본 네트워크에서 trading-bot 이 `http://watchtower:8080`
  # 으로 접근. 포트는 외부에 공개되지 않음 (expose 는 compose 내부망 전용).
  # ─────────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: trading-bot-watchtower
    restart: unless-stopped
    environment:
      - TZ=Asia/Seoul
      # label 이 붙은 컨테이너만 감시 — trading-bot 하나만 대상
      - WATCHTOWER_LABEL_ENABLE=true
      # 업데이트 후 오래된 이미지는 삭제 (디스크 절약)
      - WATCHTOWER_CLEANUP=true
      # 기동 시 배너 알림 생략
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
      # HTTP API 만 활성화, 주기 폴링은 꺼둠 (봇이 스케줄 관리)
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=false
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_TOKEN}
      # Watchtower 자체 Telegram 알림은 끈다.
      # 사용자 입장에서 필요한 메시지는 전부 봇이 직접 보낸다:
      #   - /update confirm 시 "업데이트 중..." 메시지 + 릴리스 노트
      #   - 재시작 완료 후 "*봇 기동*" 메시지 (main.py 기동 훅)
      # Watchtower 의 "Scanned/Updated/Failed" 리포트가 뜨면 사용자에게 중복/노이즈.
    expose:
      - "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
