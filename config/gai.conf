# getaddrinfo(3) 우선순위 설정.
# IPv4 매핑 주소(::ffff:0:0/96) 의 precedence 를 100 으로 올려 IPv6 네이티브(기본 40)
# 보다 우선시. 이유: Docker 기본 bridge 는 IPv6 아웃바운드 경로가 없어 IPv6 로
# connect() 시 [Errno 99] 로 실패하기 때문.
# 참고: docker-compose.yml 에서 RES_OPTIONS=no-aaaa + sysctls 로 이미 IPv6 을 끄지만,
# 이 파일은 삼중 방어의 마지막 층.
precedence ::ffff:0:0/96  100
