cycle_minutes: 10

market_hours:
  open: "09:00"
  close: "15:30"

# KIS 레이트리밋 (초당 요청 간격, 초).
# KIS 공식 유량 정책:
#   - 실전: 기본 20 req/s
#     (신규 API 발급 후 3일간은 3 req/s 로 임시 제한 — 그 기간엔 live_min_interval_sec 를 0.34 로)
#   - 모의: 기본 2 req/s (신규 제한 없음)
# 기본값은 공식 한도 대비 안전 마진 ~10% 두고 설정.
rate_limit:
  live_min_interval_sec: 0.055   # ≈18 req/s (실전 한도 20 req/s 의 90%)
  paper_min_interval_sec: 0.55   # ≈1.8 req/s (모의 한도 2 req/s 의 90%)

risk:
  max_position_per_symbol_pct: 19.5  # 종목당 총자산 최대 비중 (%) — 5종목 × 19.5% = 97.5%
  max_concurrent_positions: 5        # 동시 보유 최대 종목 수
  max_per_sector: 2                  # 동일 섹터(업종) 최대 보유 종목 수 (분산 강화)
  daily_loss_limit_pct: 3           # 전일 대비 이만큼 손실 시 신규 매수 차단
  cooldown_minutes: 30              # 같은 종목 재진입까지 최소 대기 (60 → 30 거래 활성화)
  # 손절 직후 같은 종목 재매수 금지 (분). 일반 cooldown 보다 길게 — 손절 의미 보존.
  # 0 이면 비활성. trailing_stop/take_profit 는 해당 없음 (loss-cutting 청산만 적용).
  post_stop_loss_cooldown_min: 60
  max_orders_per_day: 6             # 일일 총 주문 건수 상한

llm:
  model: "claude-haiku-4-5-20251001"
  temperature: 0
  confidence_threshold: 0.65
  daily_cost_limit_usd: 3      # 하드 한도: 도달 시 그날 LLM 호출 전면 차단 + 텔레그램 알림
  daily_cost_warn_usd: 1.0     # 소프트 경고: 누적 도달 시 텔레그램 1회 조기 경고 (차단 없음)
  # Anthropic 가격 ($/MTok). 모델 교체하면 함께 업데이트.
  input_price_per_mtok: 1.0
  output_price_per_mtok: 5.0

prefilter:
  rsi_period: 14
  rsi_buy_below: 50           # 중립권까지 LLM 검토 — 횡보장 후보 0 해소 (40 → 50)
  rsi_sell_above: 65          # 매도 후보도 한 단계 완화 (70 → 65)
  min_volume_ratio: 0.8       # 평균 미만 거래량도 후보 인정 (1.0 → 0.8)
  trend_filter_enabled: true  # 추세 필터: 현재가가 SMA 아래면 매수 후보 제외 (떨어지는 칼날 차단)
  trend_sma_period: 20        # 추세 판단용 이동평균선 기간 (일)

# Stage 6: 보유 포지션 자동 청산 규칙
# 매 점검마다 보유 종목 각각에 대해 아래 세 조건을 체크. 하나라도 충족하면 즉시 시장가 판매.
# 청산 판매는 AI 판단을 거치지 않고 기계적으로 실행 (속도/신뢰성/비용).
exit:
  stop_loss_pct: 5          # 🛡️ 손실 차단: 손익률 -5% 이하에서 손절 (고정 하한)
  take_profit_pct: 15       # 🎯 이익 확정: 손익률 +15% 이상에서 익절
  trailing_activation_pct: 7  # 📉 트레일링 활성: +7% 한 번 넘으면 트레일링 스톱 가동
  trailing_distance_pct: 4    # 📉 트레일링 낙폭: 고점 대비 -4% 떨어지면 판매
  # ATR 기반 동적 손절: 변동성 큰 종목(2차전지/바이오 등) 에 정상 등락으로 손절되지 않도록
  # 자동으로 더 넓은 손절 폭 적용. 실제 stop_loss_pct = max(고정값, ATR × mult / 현재가 × 100)
  atr_enabled: true
  atr_period: 14
  atr_multiplier: 1.5

# Stage 10: 펀더멘털 데이터 연동
# 재무지표 기반 리스크 게이트 — 기술적 신호가 떠도 PER/PBR 비정상, 부채비율 과도한
# 종목은 매수를 구조적으로 차단. LLM 에도 재무지표를 제공해 종합 판단 품질 향상.
fundamentals:
  enabled: false              # 로컬 검증 후 true 로 전환
  max_per: 50                 # PER 상한 (성장주 배제 방지, 넉넉하게)
  min_per: 0                  # PER 하한 (음수 = 적자 기업 차단)
  max_pbr: 10                 # PBR 상한
  max_debt_ratio: 300         # 부채비율 상한 (%)
  min_roe: -5                 # ROE 하한 (%)
  cache_max_age_days: 10      # 캐시 유효기간 (7일 + 주말 마진)
  # 예시:
  #   구매 200,000원 → 214,000원(+7%) 기록 → 현재 205,440원(+2.7%, 고점 대비 -4%)
  #   → 트레일링 발동, 전량 판매

# Stage 12: 매매 비용 (왕복 수수료 + 거래세 + 슬리피지)
# 수수료 못 버는 청산을 막기 위한 가드 + 손익률 표시에 net 손익을 함께 노출.
# 2026 기준 한국 주식 기본값:
#   - 위탁수수료 (KIS 온라인): 매수 0.015% + 매도 0.015%
#   - 증권거래세 (매도): 코스피·코스닥 0.20% (코스피=0.05% + 농특세 0.15%)
#   - 시장가 슬리피지: 1~2틱 ≈ 매수 0.05% + 매도 0.05%
# 왕복 비용 = 0.015*2 + 0.20 + 0.05*2 ≈ 0.33%
fees:
  commission_per_side_pct: 0.015   # 위탁수수료 (매수·매도 각각, %)
  sell_tax_pct: 0.20               # 증권거래세 + 농특세 (매도만, %)
  slippage_per_side_pct: 0.05      # 시장가 슬리피지 (매수·매도 각각, %)
  # 트레일링 청산이 트리거돼도 net pnl (수수료 차감) 이 이 값 미만이면 청산 보류.
  # 단타에서 +0.5% 익절 같은 본전 청산을 막기 위함. 손절·고정익절은 영향 없음.
  min_net_profit_pct: 0.30         # 트레일링 청산 시 최소 net 수익 (%)

# Stage 11: 거래 스타일 프리셋 (단타 / 장기 / 기본)
# 활성 스타일은 data/trade_mode 파일에 저장돼 컨테이너 재시작·이미지 업데이트에도 유지된다.
# 텔레그램 `/style scalp|swing|default` 로 즉시 토글 가능. default 는 위 prefilter/risk/exit/llm
# 기본값을 그대로 사용하며 (현재 완화된 값 = 기본 모드), scalp/swing 은 아래 키들로 위 섹션을
# 인메모리 오버라이드. 보유 종목 청산 룰도 즉시 새 폭으로 평가됨 (사용자 합의 2026-04-30).
trade_modes:
  scalp:
    description: "단타 — 짧은 손익절 + 잦은 진입 (도파민 모드)"
    prefilter:
      rsi_buy_below: 55
      rsi_sell_above: 60
      min_volume_ratio: 0.6
      trend_filter_enabled: true    # 떨어지는 칼날 차단 (2026-05-28 buy 적중률 11% 분석 후 켬)
    risk:
      cooldown_minutes: 10
      post_stop_loss_cooldown_min: 30
      max_orders_per_day: 20
    exit:
      stop_loss_pct: 2.5
      take_profit_pct: 4
      # 트레일링 활성 3% / 낙폭 1% — 최악 +2% gross → 수수료(~0.33%) 후 +1.7% net 보장.
      # 활성 2% + 낙폭 1.5% 면 +0.5% 청산 시 수수료 못 벌어 본전 → 활성을 더 보수적으로.
      trailing_activation_pct: 3
      trailing_distance_pct: 1
    llm:
      confidence_threshold: 0.60
  swing:
    description: "장기 — 보수적 진입 + 긴 보유"
    prefilter:
      rsi_buy_below: 35
      rsi_sell_above: 75
      min_volume_ratio: 1.2
      trend_filter_enabled: true
    risk:
      cooldown_minutes: 240
      post_stop_loss_cooldown_min: 240
      max_orders_per_day: 3
    exit:
      stop_loss_pct: 8
      take_profit_pct: 25
      trailing_activation_pct: 12
      trailing_distance_pct: 6
    llm:
      confidence_threshold: 0.80
