name: Create GitHub Release

# v* 형식의 태그가 push 되면 릴리스를 자동 생성한다.
# docker-publish.yml 워크플로우와 병렬로 돌아 이미지 빌드도 함께 진행.
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Release 생성에 필요

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 태그 annotation + 이전 태그 비교용

      - name: Build release body from tag annotation
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          # 태그를 찍을 때 -m 으로 넣은 한국어 요약을 릴리스 바디 최상단에 배치.
          # 이렇게 해야 봇의 /update confirm 에서 보여주는 릴리스 노트와
          # GitHub Release 페이지가 같은 내용을 공유한다.
          TAG_BODY=$(git tag -l --format='%(contents)' "$TAG_NAME")
          {
            echo "$TAG_BODY"
            echo ""
            echo "---"
            echo ""
            echo "## Docker 이미지"
            echo ""
            echo "이 릴리스는 자동으로 GHCR에 Docker 이미지로 발행됩니다."
            echo ""
            echo '```'
            echo "ghcr.io/hdream0322/trading:$TAG_NAME"
            echo "ghcr.io/hdream0322/trading:latest"
            echo '```'
            echo ""
            echo "## 배포 (NAS)"
            echo ""
            echo "**최신 버전으로 업데이트**"
            echo ""
            echo '```bash'
            echo "cd /volume1/docker/trading"
            echo "sudo docker compose pull"
            echo "sudo docker compose up -d"
            echo '```'
          } > release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_body.md
