name: Build and publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'           # v0.1.0 같은 릴리스 태그에도 빌드
    paths-ignore:
      - 'README.md'
      - '.env.example'
      - '.gitignore'
  workflow_dispatch:  # 수동 트리거 허용

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # 2026-06-02부터 Node 20 → 24 전환 예정. 미리 Node 24로 돌려서 경고 제거.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # main 브랜치 푸시 → :latest
            type=raw,value=latest,enable={{is_default_branch}}
            # 모든 푸시 → :sha-<short>
            type=sha,prefix=sha-,format=short
            # 브랜치 이름 태그 (main, feature-xxx 등)
            type=ref,event=branch
            # 릴리스 태그 v0.1.2 → :0.1.2 + :0.1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Determine version string
        id: ver
        run: |
          REF='${{ github.ref_name }}'
          # v 접두사 제거 (v0.2.0 → 0.2.0). 브랜치 이름은 그대로 (main).
          VERSION="${REF#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BOT_VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
